name: Build and Deploy to AKS

on:
  push:
    branches:
      - master

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Build with Maven
      run: |
        cd proveedor_juli
        chmod +x mvnw
        ./mvnw package -DskipTests

    - name: Login to ACR
      uses: docker/login-action@v2
      with:
        registry: proveedorjuliacr.azurecr.io
        username: ${{ secrets.ACR_USERNAME }}
        password: ${{ secrets.ACR_PASSWORD }}

    - name: Build and push Docker image
      uses: docker/build-push-action@v4
      with:
        context: ./proveedor_juli
        push: true
        tags: proveedorjuliacr.azurecr.io/proveedor_juli:latest

    - name: Azure login
      uses: azure/login@v1
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    - name: Set AKS context
      uses: azure/aks-set-context@v3
      with:
        resource-group: microservicio_group
        cluster-name: microservicio

    - name: Deploy to AKS
      run: |
        kubectl apply -f k8s/
